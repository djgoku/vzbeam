name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 15
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.11
      - name: Assert Apple Silicon
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          test "${arch}" = "arm64"
      - run: mise run ci

  release:
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.11
      - name: Assert Apple Silicon
        run: |
          arch="$(uname -m)"
          echo "runner arch: ${arch}"
          test "${arch}" = "arm64"
      - name: Log toolchain (Xcode/Swift)
        run: |
          xcode-select -p
          xcrun swift --version
      - run: mise run release
